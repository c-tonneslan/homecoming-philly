<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homecoming Philadelphia</title>
    <script>
      // Send Spanish browsers to /es/, everyone else to /en/.
      var l = (navigator.language || "en").toLowerCase().indexOf("es") === 0 ? "es" : "en";
      location.replace("/" + l + "/");
    </script>
    <meta http-equiv="refresh" content="0; url=/en/" />
  </head>
  <body>
    <p>Redirecting… <a href="/en/">English</a> · <a href="/es/">Español</a></p>
  </body>
</html>
